plugins {
    id 'com.android.application'
}

android {
    namespace 'com.volumeoverlay.app'
    compileSdk 34

    defaultConfig {
        applicationId "com.volumeoverlay.app"
        minSdk 23
        targetSdk 28
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
    implementation 'androidx.core:core:1.13.1'
}
